<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Draft</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
    .body { white-space: pre-wrap; margin: 1.5rem 0; padding: 1rem; background: #f8f8f8; border-radius: 4px; }
    textarea { width: 100%; min-height: 200px; font-family: inherit; font-size: 1rem; padding: 0.5rem; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; border: none; border-radius: 4px; cursor: pointer; }
    .approve { background: #2d7d46; color: white; }
    .revise { background: #0969da; color: white; }
    h1 { font-size: 1.5rem; }
  </style>
</head>
<body>
  <h1>Review Draft</h1>
  <div class="meta">{{.Post.Kind}} &middot; {{.Post.ID}}</div>

  <form method="POST" action="/drafts/{{.Post.ID}}/revise">
    <input type="hidden" name="token" value="{{.Token}}">
    <textarea name="body">{{.Post.Body}}</textarea>
    <div class="actions">
      <button type="submit" class="revise">Save Revision</button>
    </div>
  </form>

  <form method="POST" action="/drafts/{{.Post.ID}}/approve">
    <input type="hidden" name="token" value="{{.Token}}">
    <div class="actions">
      <button type="submit" class="approve">Approve for Publishing</button>
    </div>
  </form>
</body>
</html>
